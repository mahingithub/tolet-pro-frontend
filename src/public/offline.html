<!DOCTYPE html>
<!--
  Offline fallback for TO-LET PRO. Shown by the service worker only when the
  user is offline AND the requested page isn't cached. Self-contained (no
  external CSS/JS) so it works with zero network.
  ► TO CHANGE: edit the inline styles/text below; keep it dependency-free.
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TO-LET PRO — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #ffffff;
      color: #1f2937;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .wrap { max-width: 320px; }
    .logo {
      width: 88px; height: 88px;
      border-radius: 22px;
      background: #ba0036;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 24px;
    }
    h1 { font-size: 20px; font-weight: 800; margin-bottom: 8px; }
    p { font-size: 14px; color: #6b7280; line-height: 1.6; font-weight: 500; }
    button {
      margin-top: 24px;
      background: #ba0036; color: #fff;
      border: none; border-radius: 14px;
      padding: 12px 28px;
      font-size: 14px; font-weight: 800;
      cursor: pointer;
    }
    button:active { transform: scale(0.96); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo">
      <svg width="44" height="44" viewBox="0 0 512 512" fill="#fff" xmlns="http://www.w3.org/2000/svg">
        <rect x="176" y="150" width="160" height="226" rx="10"/>
        <rect x="232" y="120" width="48" height="36" rx="8"/>
        <rect x="236" y="320" width="40" height="56" rx="6" fill="#ba0036"/>
        <g fill="#ba0036">
          <rect x="200" y="182" width="34" height="30" rx="5"/><rect x="278" y="182" width="34" height="30" rx="5"/>
          <rect x="200" y="232" width="34" height="30" rx="5"/><rect x="278" y="232" width="34" height="30" rx="5"/>
          <rect x="200" y="282" width="34" height="30" rx="5"/><rect x="278" y="282" width="34" height="30" rx="5"/>
        </g>
      </svg>
    </div>
    <h1>You're offline</h1>
    <p>TO-LET PRO needs an internet connection for listings, chat, and calls. Check your connection and try again.</p>
    <button onclick="location.reload()">Try again</button>
  </div>
</body>
</html>
